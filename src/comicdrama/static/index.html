<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ComicDrama Creator Workflow</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>ComicDrama Creator Workflow</h1>
          <p>小说到漫剧创作工作台</p>
        </div>
        <div class="status" id="status">Ready</div>
      </header>

      <section class="workspace">
        <section class="source-pane" aria-label="素材输入">
          <div class="section-head">
            <h2>素材</h2>
            <button class="ghost-button" id="loadSample" type="button">载入示例</button>
          </div>
          <label>
            项目标题
            <input id="titleInput" type="text" value="雨夜来信" />
          </label>
          <div class="upload-row">
            <input
              id="fileInput"
              type="file"
              accept=".txt,.md,.markdown,.pdf,.docx,.html,.htm,.csv,.json,.rtf,.xlsx,text/plain,text/markdown,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
            <button class="secondary-button" id="uploadButton" type="button">上传文档</button>
            <div class="file-meta" id="fileMeta">未选择附件</div>
          </div>
          <label>
            原始小说文本
            <textarea id="sourceText" spellcheck="false"></textarea>
          </label>
          <label>
            人物设定参考
            <textarea id="characterReference" class="compact-textarea" spellcheck="false"></textarea>
          </label>
          <div class="rights-line">
            <input id="rightsConfirm" type="checkbox" checked />
            <label for="rightsConfirm">确认拥有合法处理或测试授权</label>
          </div>
        </section>

        <section class="result-pane" aria-label="生成结果">
          <nav class="tabs" aria-label="结果类型">
            <button class="tab active" type="button" data-tab="overview">概览</button>
            <button class="tab" type="button" data-tab="characters">人物与元素</button>
            <button class="tab" type="button" data-tab="script">剧本</button>
            <button class="tab" type="button" data-tab="storyboard">分镜</button>
            <button class="tab" type="button" data-tab="batch">批量</button>
            <button class="tab" type="button" data-tab="assist">辅创</button>
            <button class="tab" type="button" data-tab="json">JSON</button>
          </nav>
          <div class="result-body" id="resultBody">
            <div class="empty-state">点击运行后查看精简小说、剧本和分镜结果。</div>
          </div>
        </section>

        <aside class="settings-pane" aria-label="工作流参数">
          <h2>参数</h2>
          <section class="task-mode" aria-label="任务模式">
            <div class="settings-subhead">任务模式</div>
            <div class="mode-grid">
              <button class="mode-button active" type="button" data-preset="all">
                <strong>全流程</strong>
                <span>精炼、提取、剧本、批量与辅创</span>
              </button>
              <button class="mode-button" type="button" data-preset="simplify">
                <strong>小说简炼</strong>
                <span>压缩长文并保留主线</span>
              </button>
              <button class="mode-button" type="button" data-preset="extract">
                <strong>人物场景提取</strong>
                <span>角色、地点、道具与节拍</span>
              </button>
              <button class="mode-button" type="button" data-preset="script">
                <strong>剧本转换</strong>
                <span>生成旁白或好莱坞格式</span>
              </button>
              <button class="mode-button" type="button" data-preset="batch">
                <strong>批量处理</strong>
                <span>改名、格式统一和导出预览</span>
              </button>
              <button class="mode-button" type="button" data-preset="assist">
                <strong>辅助创作</strong>
                <span>给出改编优化建议</span>
              </button>
            </div>
          </section>
          <details class="advanced-options">
            <summary>高级自定义</summary>
            <section class="feature-list" aria-label="功能选择">
              <label class="feature-option">
                <input type="checkbox" name="feature" value="simplify" checked />
                <span>小说精炼</span>
              </label>
              <label class="feature-option">
                <input type="checkbox" name="feature" value="extract_elements" checked />
                <span>人物场景提取</span>
              </label>
              <label class="feature-option">
                <input type="checkbox" name="feature" value="convert_script" checked />
                <span>剧本格式转换</span>
              </label>
              <label class="feature-option">
                <input type="checkbox" name="feature" value="batch_process" checked />
                <span>批量内容处理</span>
              </label>
              <label class="feature-option">
                <input type="checkbox" name="feature" value="assist_adaptation" checked />
                <span>小说辅助创作</span>
              </label>
            </section>
          </details>
          <label>
            漫剧风格
            <select id="styleSelect">
              <option value="chinese">中式</option>
              <option value="japanese">日式</option>
              <option value="western">欧美式</option>
              <option value="custom">自定义</option>
            </select>
          </label>
          <label>
            剧本格式
            <select id="formatSelect">
              <option value="comic_narration">旁白漫剧格式</option>
              <option value="hollywood">好莱坞格式</option>
            </select>
          </label>
          <label>
            旁白视角
            <select id="povSelect">
              <option value="third_person">第三人称</option>
              <option value="first_person">第一人称</option>
            </select>
          </label>
          <label>
            分镜精细度
            <select id="detailSelect">
              <option value="low">低</option>
              <option value="medium" selected>中</option>
              <option value="high">高</option>
            </select>
          </label>
          <label>
            对话保留比例 <span id="ratioValue">80%</span>
            <input id="ratioInput" type="range" min="0" max="100" value="80" />
          </label>
          <button class="primary-button" id="runButton" type="button">运行工作流</button>
          <button class="secondary-button" id="downloadButton" type="button" disabled>下载 JSON</button>
        </aside>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
